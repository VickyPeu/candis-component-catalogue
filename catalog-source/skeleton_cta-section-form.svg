<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sk-t sk-d" font-family="Inter, system-ui, sans-serif">
<title id="sk-t">Skeleton: CTA Section — form mode</title>
<desc id="sk-d">Low-fidelity wireframe: a CTA card split into two equal halves — left half has eyebrow, heading, paragraph and a sign-up form (email field plus submit button); right half is an optional image.</desc>
<style>
  .card { fill: #ffffff; stroke: #c1babe; stroke-width: 1; }
  .ph { fill: #ded8d8; }
  .fld { fill: #ede8e8; stroke: #9e959c; stroke-width: 1; }
  .btn { fill: #9e959c; }
  .fr { fill: #ded8d8; stroke: #c1babe; stroke-width: 1; }
  .lb { fill: #716571; font-size: 11px; }
</style>
<rect x="40" y="50" width="600" height="230" rx="12" class="card"/>
<rect x="70" y="80" width="100" height="14" rx="7" class="ph"/>
<text x="178" y="91" class="lb">eyebrow</text>
<rect x="70" y="104" width="210" height="18" rx="4" class="ph"/>
<text x="288" y="118" class="lb">heading</text>
<rect x="70" y="138" width="210" height="8" rx="4" class="ph"/>
<rect x="70" y="152" width="190" height="8" rx="4" class="ph"/>
<text x="288" y="147" class="lb">paragraph</text>
<rect x="70" y="184" width="160" height="30" rx="6" class="fld"/>
<text x="82" y="203" class="lb">email field</text>
<rect x="240" y="184" width="90" height="30" rx="6" class="btn"/>
<text x="285" y="203" text-anchor="middle" class="lb">submit</text>
<rect x="350" y="80" width="260" height="170" rx="8" class="fr"/>
<text x="480" y="162" text-anchor="middle" class="lb">image</text>
<text x="480" y="176" text-anchor="middle" class="lb">(optional)</text>
</svg>
