<svg viewBox="0 0 680 356" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sk-t sk-d" font-family="Inter, system-ui, sans-serif">
<title id="sk-t">Skeleton: Grid Section — Bento L</title>
<desc id="sk-d">Low-fidelity wireframe: an optional section eyebrow, heading and paragraph on top, then image-led cards in rows of 2 (2 or 4 cards). Each card pairs a required 16:10 image with a short heading, a brief paragraph and an optional link.</desc>
<style>
  .ph{fill:#ded8d8}
  .lb{fill:#716571;font-size:11px}
  .fr{fill:#ede8e8;stroke:#c1babe;stroke-width:1}
</style>
