<rect x="360" y="140" width="300" height="160" rx="10" fill="none" stroke="#ded8d8"/><rect x="376" y="160" width="150" height="94" rx="6" class="fr"/><text x="451" y="211" text-anchor="middle" class="lb">image 16:10</text><rect x="540" y="162" width="104" height="13" rx="3" class="ph"/><rect x="540" y="188" width="104" height="6" rx="3" class="ph"/><rect x="540" y="199" width="96" height="6" rx="3" class="ph"/><rect x="540" y="210" width="72" height="6" rx="3" class="ph"/><rect x="540" y="246" width="64" height="10" rx="3" class="ph"/>
<text x="20" y="330" class="lb">image-led · 16:10 image required · heading ≤23 · paragraph ≤70 · optional link</text>
