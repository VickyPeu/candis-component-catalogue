<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sk-t sk-d" font-family="Inter, system-ui, sans-serif">
<title id="sk-t">Skeleton: Hero Section — Full Image</title>
<desc id="sk-d">Low-fidelity wireframe: a full-bleed background image with the eyebrow, heading, a short (max 3-line) paragraph and two buttons centered over it in white. A separate portrait image is required for mobile, and the text must stay legible over the image.</desc>
<style>
  .ph{fill:#ded8d8}
  .lb{fill:#716571;font-size:11px}
</style>
<rect x="10" y="10" width="660" height="340" rx="12" fill="#6f6675"/>
<text x="28" y="34" fill="#ffffff" opacity="0.75" font-size="11">full background image (anything) — keep the centered text legible</text>
<rect x="270" y="108" width="140" height="10" rx="5" fill="#ffffff" opacity="0.85"/>
<rect x="190" y="130" width="300" height="18" rx="4" fill="#ffffff"/><rect x="230" y="152" width="220" height="18" rx="4" fill="#ffffff"/>
<rect x="215" y="186" width="250" height="7" rx="3" fill="#ffffff" opacity="0.8"/><rect x="245" y="198" width="190" height="7" rx="3" fill="#ffffff" opacity="0.8"/>
<rect x="209" y="224" width="120" height="32" rx="6" fill="#ffffff"/><text x="269" y="244" text-anchor="middle" fill="#2b1a2e" font-size="11">primary</text>
<rect x="341" y="224" width="130" height="32" rx="6" fill="none" stroke="#ffffff"/><text x="406" y="244" text-anchor="middle" fill="#ffffff" font-size="11">secondary</text>
<text x="340" y="288" text-anchor="middle" fill="#ffffff" opacity="0.7" font-size="11">eyebrow · heading · ≤3-line paragraph · buttons — all centered</text>
<text x="652" y="338" text-anchor="end" fill="#ffffff" opacity="0.7" font-size="11">portrait image required for mobile</text>
</svg>
