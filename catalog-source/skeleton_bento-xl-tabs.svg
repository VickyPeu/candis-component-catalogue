<svg viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sk-t sk-d" font-family="Inter, system-ui, sans-serif">
<title id="sk-t">Skeleton: Grid Section — Bento XL Tabs</title>
<desc id="sk-d">Low-fidelity wireframe: section header, then vertical tabs on the left (every topic visible; scroll steps through them one after another, or click for full control; the active tab is highlighted and can carry an icon), the active Bento XL's paragraph in the middle, and a 1:1 image on the right.</desc>
