<svg viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sk-t sk-d" font-family="Inter, system-ui, sans-serif">
<title id="sk-t">Skeleton: Grid Section — Bento XL Tabs</title>
<desc id="sk-d">Low-fidelity wireframe: an optional section header on top, then a row of tabs (every topic visible at a glance, the heading is the tab label) with one active, and a panel below showing the active Bento XL — a big image/video with rich copy. Up to about five tabs.</desc>
<style>
  .ph{fill:#ded8d8}
  .lb{fill:#716571;font-size:11px}
  .fr{fill:#ede8e8;stroke:#c1babe;stroke-width:1}
</style>
