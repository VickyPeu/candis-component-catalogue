<svg viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sk-t sk-d" font-family="Inter, system-ui, sans-serif">
<title id="sk-t">Skeleton: Hero Section — Centered Video</title>
<desc id="sk-d">Low-fidelity wireframe: a fully centered hero — eyebrow, heading, trust chips, paragraph and two buttons centered above a large centered video (16:9). The video is the main piece; on scroll it grows and the background inverts. Use sparingly.</desc>
<style>
  .ph{fill:#ded8d8}
  .lb{fill:#716571;font-size:11px}
  .fr{fill:#ede8e8;stroke:#c1babe;stroke-width:1}
</style>
