<rect x="170" y="44" width="340" height="18" rx="4" class="ph"/><rect x="215" y="66" width="250" height="18" rx="4" class="ph"/><text x="520" y="58" class="lb">heading</text>
<rect x="180" y="92" width="100" height="22" rx="11" fill="#ffffff" stroke="#ded8d8"/><circle cx="196" cy="103" r="4" class="ph"/><rect x="206" y="99" width="62" height="8" rx="3" class="ph"/>
<rect x="290" y="92" width="100" height="22" rx="11" fill="#ffffff" stroke="#ded8d8"/><circle cx="306" cy="103" r="4" class="ph"/><rect x="316" y="99" width="62" height="8" rx="3" class="ph"/>
<rect x="400" y="92" width="100" height="22" rx="11" fill="#ffffff" stroke="#ded8d8"/><circle cx="416" cy="103" r="4" class="ph"/><rect x="426" y="99" width="62" height="8" rx="3" class="ph"/><text x="510" y="107" class="lb">trust chips</text>
<rect x="150" y="130" width="380" height="7" rx="3" class="ph"/><rect x="170" y="142" width="340" height="7" rx="3" class="ph"/><rect x="205" y="154" width="270" height="7" rx="3" class="ph"/><text x="540" y="146" class="lb">paragraph</text>
<rect x="225" y="178" width="110" height="30" rx="6" fill="#2b1a2e"/><text x="280" y="197" text-anchor="middle" fill="#ffffff" font-size="11">primary</text>
<rect x="345" y="178" width="110" height="30" rx="6" fill="none" stroke="#ded8d8"/><text x="400" y="197" text-anchor="middle" class="lb">secondary</text>
