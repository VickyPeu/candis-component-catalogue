<rect x="340" y="306" width="32" height="32" rx="8" class="fr"/><rect x="340" y="348" width="110" height="9" rx="3" class="ph"/><rect x="340" y="364" width="130" height="6" rx="3" class="ph"/><rect x="340" y="374" width="100" height="6" rx="3" class="ph"/>
