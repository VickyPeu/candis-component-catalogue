<svg viewBox="0 0 680 405" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sk-t sk-d" font-family="Inter, system-ui, sans-serif">
<title id="sk-t">Skeleton: Hero Section — Common</title>
<desc id="sk-d">Low-fidelity wireframe: eyebrow, heading and paragraph with a primary and secondary button and trust badges on the left; one media (image 1:1 or video 16:9, with an optional floating layer) on the right; and an optional row of 3–5 Bento XS underneath that render as cards when they link to a Bento XL.</desc>
<style>
  .ph{fill:#ded8d8}
  .lb{fill:#716571;font-size:11px}
  .fr{fill:#ede8e8;stroke:#c1babe;stroke-width:1}
</style>
<rect x="20" y="28" width="170" height="11" rx="5" class="ph"/><text x="198" y="38" class="lb">eyebrow ≤42</text>
<rect x="20" y="50" width="300" height="20" rx="4" class="ph"/><rect x="20" y="76" width="230" height="20" rx="4" class="ph"/><text x="330" y="65" class="lb">heading</text>
<rect x="20" y="112" width="310" height="7" rx="3" class="ph"/><rect x="20" y="124" width="300" height="7" rx="3" class="ph"/><rect x="20" y="136" width="270" height="7" rx="3" class="ph"/>
<rect x="20" y="160" width="140" height="32" rx="6" fill="#2b1a2e"/><text x="90" y="180" text-anchor="middle" fill="#ffffff" font-size="11">primary</text>
<rect x="170" y="160" width="150" height="32" rx="6" fill="none" stroke="#ded8d8"/><text x="245" y="180" text-anchor="middle" class="lb">secondary</text>
<text x="20" y="208" class="lb">choose your preferred date</text>
<rect x="20" y="222" width="74" height="30" rx="5" fill="none" stroke="#ded8d8"/><text x="57" y="241" text-anchor="middle" class="lb">GoBD</text><rect x="104" y="222" width="110" height="30" rx="5" fill="none" stroke="#ded8d8"/><text x="159" y="241" text-anchor="middle" class="lb">Cloud Services</text><text x="224" y="241" class="lb">trust badges (or chips)</text>
<rect x="368" y="28" width="292" height="226" rx="10" class="fr"/><circle cx="514" cy="135" r="24" fill="#895fd5"/><polygon points="506,123 506,147 528,135" fill="#ffffff"/><rect x="600" y="228" width="48" height="16" rx="4" fill="#2b1a2e"/><text x="624" y="240" text-anchor="middle" fill="#ffffff" font-size="9">03 min</text><text x="368" y="272" class="lb">image 1:1 or video 16:9 · floating layer optional</text>
<text x="20" y="294" class="lb">optional Bento XS (3–5) — links to a Bento XL render as cards, otherwise card-less; can be omitted</text>
