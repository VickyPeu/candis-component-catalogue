<title id="sk-t">Skeleton: Grid Section — Bento XS</title>
<desc id="sk-d">Low-fidelity wireframe: an optional section eyebrow, heading and paragraph on top, then a row of 2–5 compact cards, each with an icon, a short heading and a one-line paragraph. Icons only, no images. A card can optionally scroll to a Bento XL anchor.</desc>
