<title id="sk-t">Skeleton: Grid Section — Bento S</title>
<desc id="sk-d">Low-fidelity wireframe: an optional section eyebrow, heading and paragraph on top, then small cards in rows of 4. You pick ONE top visual for ALL cards — a colored line, an icon, or an image. Each card also has a heading, a short paragraph and an optional text link.</desc>
