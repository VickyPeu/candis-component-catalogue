<rect x="230" y="146" width="410" height="11" rx="4" fill="#ffffff" opacity="0.92"/><rect x="230" y="164" width="420" height="11" rx="4" fill="#ffffff" opacity="0.92"/><rect x="230" y="182" width="300" height="11" rx="4" fill="#ffffff" opacity="0.92"/>
