<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sk-t sk-d" font-family="Inter, system-ui, sans-serif">
<title id="sk-t">Skeleton: Slider Section — Testimonials</title>
<desc id="sk-d">Low-fidelity wireframe: a testimonial on a dark band — a 1:1 portrait on the left, the person's name and title plus the company logo on the right, and a short quote beneath. Slider dots at the bottom; one testimonial is static, several become a slider.</desc>
<style>
  .ph{fill:#ded8d8}
  .lb{fill:#716571;font-size:11px}
