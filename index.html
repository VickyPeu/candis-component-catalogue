<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Candis Component Catalogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf8f8; --surface:#fff; --ink:#2b1a2e; --body:#463748; --muted:#716571; --line:#ded8d8; --accent:#895fd5;
    --accent-soft:#f6f1fd; --accent-line:#e7daf7; --dark:#2b1a2e;
    --serif:"Inter",system-ui,sans-serif; --sans:"Inter",system-ui,sans-serif; --mono:"Inter",system-ui,sans-serif;
    --p-authority:#3F3A74; --p-thought:#75323B; --p-standard:#206062; --p-trust:#314C39; --p-translation:#BE704C; --p-neutral:#5F5E5A;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--body);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:44px 22px 80px}
  .topbar{position:relative;border-bottom:1px solid var(--line);padding-bottom:26px;
    background-image:radial-gradient(var(--line) 1px,transparent 1px);background-size:18px 18px;background-position:0 -2px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 8px}
  h1{font-family:var(--serif);font-weight:600;color:var(--ink);font-size:40px;line-height:1.05;letter-spacing:-.02em;margin:0 0 10px}
  .lede{color:var(--muted);font-size:15.5px;margin:0;max-width:640px}
  /* AI console card — the hero */
  .console{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:22px 22px 20px;margin-top:14px;box-shadow:0 6px 24px -16px rgba(43,26,46,.25)}
  .greeting{display:flex;gap:13px;align-items:flex-start;margin-bottom:16px}
  .greeting .avatar{flex:none;width:62px;height:62px;border-radius:50%;object-fit:cover;object-position:50% 30%;border:1px solid var(--accent-line);background:#fff}
  .greeting p{margin:0;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:14px;border-top-left-radius:4px;padding:11px 15px;font-size:14.5px;color:var(--ink)}
  .ask{display:flex;gap:10px}
  .ask input{flex:1;padding:16px 18px;border:1px solid var(--line);border-radius:13px;font-size:15px;font-family:var(--sans);background:var(--bg);color:var(--ink)}
  .ask input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px #895fd526;background:var(--surface)}
  .ask button{flex:none;width:54px;border:none;background:var(--ink);color:#fff;border-radius:13px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
  .ask button:hover{background:var(--accent)}
  /* browse-by-pillar row (secondary) */
  .browse{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:16px}
  .browse .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-right:4px}
  /* engaging loader */
  #loader{display:flex;align-items:center;gap:13px;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:16px;padding:20px 22px;margin:18px 0}
  .spinner{flex:none;width:20px;height:20px;border:2.5px solid var(--accent-line);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader-msg{font-size:14.5px;color:var(--ink);font-weight:600}
  .examples{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:13px}
  .examples .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .ex{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;padding:5px 12px;border:1px dashed var(--line);border-radius:999px;background:transparent;cursor:pointer;color:var(--body)}
  .ex:hover{border-style:solid;border-color:var(--accent);color:var(--accent)}
  .ex svg{width:12px;height:12px;opacity:.6}
  .ex:hover svg{opacity:1}
  .filters{margin-top:18px;display:flex;flex-direction:column;gap:8px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chips .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);align-self:center;margin-right:4px}
  /* Pillar chips — coloured by swimlane (dot + fill-on-active) */
  .pchip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;padding:5px 12px;border:1px solid var(--line);border-radius:999px;background:var(--surface);cursor:pointer;user-select:none;color:var(--ink)}
  .pchip .dot{width:9px;height:9px;border-radius:50%;background:var(--pc);flex:none}
  .pchip:hover{border-color:var(--pc)}
  .pchip.on{background:var(--pc);color:#fff;border-color:var(--pc)}
  .pchip.on .dot{background:#fff}
  .interpret{font-size:14px;color:var(--muted);margin:22px 0 10px;min-height:18px}
  .interpret b{color:var(--ink);font-weight:600}
  #wire{background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:16px;padding:18px 20px;margin-bottom:16px}
  .wire-h{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  .wire-list{margin:0;padding-left:20px}
  .wire-list li{margin-bottom:9px;font-size:14px}
  .wire-why{font-size:13px;color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:72px 20px;border:1px dashed var(--line);border-radius:16px;margin-top:18px;background:var(--surface)}
  .empty .big{font-family:var(--serif);font-size:21px;color:var(--ink);margin-bottom:6px}
  /* peek slider — active card centred, neighbours lean in */
  .peekport{position:relative;overflow:hidden;margin-bottom:14px}
  .peektrack{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1)}
  .peektrack .slot{flex:0 0 80%;padding:0 9px;transition:opacity .3s,transform .3s}
  .peektrack .slot:not(.active){opacity:.4;transform:scale(.96)}
  .scard{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:30px 32px;box-shadow:0 1px 0 rgba(0,0,0,.02);height:100%}
  .arrow{position:absolute;top:150px;transform:translateY(-50%);z-index:3;width:44px;height:44px;border:1px solid var(--line);background:var(--surface);border-radius:50%;cursor:pointer;font-size:19px;color:var(--ink);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px -8px rgba(43,26,46,.45)}
  .arrow:hover{border-color:var(--accent);color:var(--accent)}
  .arrow.l{left:4px}.arrow.r{right:4px}
  .resultbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px}
  #rhead{font-size:14px;color:var(--muted)}
  #rhead b{color:var(--ink);font-weight:600}
  .jump{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .jump select{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--ink);max-width:240px}
  .meta-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .cat{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:3px 8px}
  .pills{display:flex;flex-wrap:wrap;gap:5px}
  .pill{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:500}
  .cname{font-family:var(--serif);font-weight:600;color:var(--ink);font-size:30px;line-height:1.08;letter-spacing:-.02em;margin:0 0 8px}
  .purpose{font-size:16px;margin:0 0 20px;max-width:70ch;color:#463748}
  .shout{display:flex;gap:14px;align-items:flex-start;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:14px;padding:14px 16px;margin-bottom:22px}
  .shout .tagk{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:#fff;border:1px solid var(--accent-line);border-radius:6px;padding:4px 8px;white-space:nowrap}
  .shout p{margin:0;font-size:14.5px;color:#463748}
  .visual{margin:0 0 22px;background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:16px 16px 10px;position:relative}
  .visual .vlabel{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .visual svg{display:block;width:100%;height:auto;max-height:420px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:760px){.grid-2,.grid-3{grid-template-columns:1fr}}
  .panel{border:1px solid var(--line);border-radius:14px;padding:16px 18px;background:var(--surface)}
  .panel > h3{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin:0 0 12px;font-weight:500}
  /* spec sheet */
  .spec{border-color:var(--accent-line);background:#fcfaff}
  .spec > h3{color:var(--accent)}
  .spec-row{display:flex;justify-content:space-between;gap:14px;padding:6px 0;border-top:1px dotted var(--line);font-size:13.5px}
  .spec-row:first-of-type{border-top:none}
  .spec-k{color:var(--muted)}
  .spec-v{font-family:var(--mono);font-size:12.5px;text-align:right}
  .spec-h{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:14px 0 4px}
  .spec-assets{font-size:13.5px;color:var(--ink);background:var(--accent-soft);border-radius:8px;padding:8px 10px}
  .create{display:inline-block;margin-top:16px;background:var(--accent);color:#fff;text-decoration:none;font-family:var(--mono);font-size:12.5px;letter-spacing:.03em;padding:10px 15px;border-radius:10px}
  .create:hover{filter:brightness(1.07)}
  .hint{font-size:12px;color:var(--muted);margin:8px 0 0}
  .uses ul{margin:0;padding-left:18px;font-size:14px}.uses li{margin-bottom:5px}
  .box ul{margin:0;padding-left:18px;font-size:13.5px}.box li{margin-bottom:5px}
  .box p{margin:0;font-size:13.5px}
  .box.good{background:#E9F6F0;border-color:#A6E1CC}.box.good>h3{color:#0F6E56}
  .box.warn{background:#FCF0DB;border-color:#F4C879}.box.warn>h3{color:#8A520B}
  .box.bad{background:#FCECEC;border-color:#F3C0C0}.box.bad>h3{color:#A32D2D}
  /* Skeleton palette — Candis plum greyscale ramp (see DESIGN-SPEC.md §B). Content=filled, containers=outlined. */
  .ph{fill:#ded8d8}.lb{fill:#716571;font-size:11px;font-family:var(--mono)}
  .kard{fill:#fff;stroke:#ded8d8;stroke-width:1}.fr{fill:#ede8e8;stroke:#c1babe;stroke-width:1}
  .fld{fill:#ede8e8;stroke:#9e959c;stroke-width:1}.btn{fill:#9e959c}.tag{fill:#ede8e8;stroke:#c1babe;stroke-width:1}
  .tbl{fill:none;stroke:#c1babe;stroke-width:1}.sep{stroke:#ded8d8;stroke-width:1}
  .hl{stroke:#716571;stroke-width:2}.hc{fill:#ede8e8;stroke:#716571;stroke-width:2}
  .chk{fill:none;stroke:#1D9E75;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}.crs{stroke:#E24B4A;stroke-width:2.4;stroke-linecap:round}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <p class="eyebrow">Website Component Catalogue</p>
    <h1>What do you want to say?</h1>
  </div>
  <div class="console">
    <div class="greeting">
      <img class="avatar" src="assets/compony-2.webp" alt="Compony — your component librarian">
      <p>Hi, I'm <b>Compony</b> 🐴 — I'll trot off and fetch the right building blocks for your message: <b>copy limits</b>, <b>assets</b>, <b>pillar fit</b>, and a link straight into Contentful.</p>
    </div>
    <div class="examples" id="examples"><span class="lbl">Try</span></div>
    <div class="ask">
      <input id="ask" type="search" placeholder="Describe your use case…" aria-label="Describe your use case">
      <button id="askBtn" aria-label="Suggest">→</button>
    </div>
  </div>
  <div class="browse"><span class="lbl">Or browse by pillar</span><div class="chips" id="pillarChips"></div></div>
  <div class="interpret" id="interpret"></div>
  <div id="loader" style="display:none"><span class="spinner"></span><span class="loader-msg" id="loaderMsg"></span></div>
  <div id="wire" style="display:none"></div>
  <div id="slider" style="display:none">
    <div class="resultbar">
      <span id="rhead"></span>
      <label class="jump">Jump to <select id="jump" aria-label="Jump to component"></select></label>
    </div>
    <div class="peekport">
      <button class="arrow l" id="prev" aria-label="Previous component">‹</button>
      <div class="peektrack" id="track"></div>
      <button class="arrow r" id="next" aria-label="Next component">›</button>
    </div>
  </div>
  <div class="empty" id="empty" style="display:none"></div>
</div>

function cssvar(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function pill(key){const [label,v]=PILLARS[key];const c=cssvar(v);return `<span class="pill" style="background:${c}1f;color:${c}">${label}</span>`;}
function li(a){return a.map(x=>`<li>${x}</li>`).join("");}
DATA.forEach(d=>{d._text=(d.name+" "+d.purpose+" "+d.uses.join(" ")+" "+d.kw.join(" ")).toLowerCase();});
function detectPillars(q){const s=new Set();for(const p in PT){if(PT[p].some(t=>q.includes(t)))s.add(p);}return s;}
function score(d,q,qp){let sc=0;for(const k of d.kw){if(q.includes(k))sc+=3;}for(const p of qp){if(d.chips.includes(p))sc+=3;else if(d.cd)sc+=1.5;else if(d.pillars.includes(p))sc+=1;}q.split(/[^a-zäöü]+/).forEach(t=>{if(t.length>=4&&d._text.includes(t))sc+=0.4;});return sc;}

     <div class="spec-h">Assets / graphics</div><div class="spec-assets">${d.assets}</div>
     <a class="create" href="${create}" target="_blank" rel="noopener">Open in Contentful →</a>
     <p class="hint">Opens the ${d.ct} entries — click “Add entry”, then ${d.cthint}.</p>
   </section>
   <section class="panel uses"><h3>Usecase examples</h3><ul>${li(d.uses)}</ul></section>
 </div>
 <div class="grid-3">
   <section class="panel box good"><h3>Strengths</h3><ul>${li(d.str)}</ul></section>
   <section class="panel box warn"><h3>Limitations</h3><ul>${li(d.lim)}</ul></section>
   <section class="panel box bad"><h3>Anti-pattern</h3><p>${d.anti}</p></section>
 </div>`;
}

let results=[], cur=0, aiNotes={}, aiWire=[], noteLabel="For your brief", annotating=false;
const selP=new Set(),selC=new Set();
const $=id=>document.getElementById(id);
function heuristic(){
 const q=$("ask").value.trim().toLowerCase();let order,qp=new Set();
 if(q){qp=detectPillars(q);let sc=DATA.map(d=>({d,s:score(d,q,qp)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);const top=sc.length?sc[0].s:0;sc=sc.filter(x=>x.s>=Math.max(2,top*0.4));order=sc.map(x=>x.d);}
 else order=DATA.slice();
 order=order.filter(d=>(selP.size===0||[...selP].some(p=>d.pillars.includes(p)))&&(selC.size===0||selC.has(d.cat)));
 return {order,qp,q};
}
function repaintActive(){
 $("track").style.transform="translateX(calc("+(-cur*80)+"% + 10%))";
 [...$("track").children].forEach(s=>s.classList.toggle("active",+s.dataset.i===cur));
 $("jump").value=cur;
}
function paintWire(){const w=$("wire");if(!aiWire.length){w.style.display="none";w.innerHTML="";return;}w.style.display="block";w.innerHTML='<div class="wire-h">Suggested wireframe — top to bottom</div><ol class="wire-list">'+aiWire.map(s=>{const d=DATA.find(x=>x.id===s.id);const nm=d?d.name:s.id;const pl=(s.pillar&&PILLARS[s.pillar])?' · <span style="color:'+cssvar(PILLARS[s.pillar][1])+'">'+PILLARS[s.pillar][0]+'</span>':'';return '<li><b>'+nm+'</b>'+pl+(s.role?'<br><span class="wire-why">'+s.role+'</span>':'')+'</li>';}).join('')+'</ol>';}
function paint(list,interpHTML){
 paintWire();
 if(!list.length){$("slider").style.display="none";$("empty").style.display="none";$("interpret").innerHTML=interpHTML||"No good-fit components.";return;}
 $("interpret").innerHTML="";$("empty").style.display="none";$("slider").style.display="block";
 results=list;if(cur>=results.length)cur=0;
 $("rhead").innerHTML=interpHTML;
 $("track").innerHTML=results.map((d,i)=>'<div class="slot" data-i="'+i+'"><div class="scard">'+cardHTML(d)+'</div></div>').join("");
 [...$("track").children].forEach(s=>s.addEventListener("click",()=>{const i=+s.dataset.i;if(i!==cur){cur=i;repaintActive();}}));
 $("jump").innerHTML=results.map((d,i)=>'<option value="'+i+'">'+d.name+'</option>').join("");
 repaintActive();
}
// ---- engaging loader (themed status lines, min display so it never flashes) ----
let loaderTimer=null, loaderStart=0, runId=0;
const SEARCH_MSGS=["Compony's trotting to the shelves…","Sniffing out the right building blocks…","Checking which pillars each one serves…","Trotting back with the best matches…","Laying out the sections…"];
function pillarMsgs(){const n=[...selP].map(p=>PILLARS[p][0]).join(" + ");return ["Compony's trotting to the "+n+" shelf…","Gathering every matching block…","Tailoring each block to "+n+"…","Noting how each one works for "+n+"…"];}
function startLoader(msgs){
 $("slider").style.display="none";$("empty").style.display="none";$("wire").style.display="none";$("interpret").innerHTML="";
 $("loaderMsg").textContent=msgs[0];$("loader").style.display="flex";let i=0;
 clearInterval(loaderTimer);loaderTimer=setInterval(()=>{i=(i+1)%msgs.length;$("loaderMsg").textContent=msgs[i];},1600);
 loaderStart=performance.now();
}
function stopLoader(my,done){
 const wait=Math.max(0,800-(performance.now()-loaderStart));
 setTimeout(()=>{if(my!==runId)return;clearInterval(loaderTimer);$("loader").style.display="none";done();},wait);
}
function showStart(){clearInterval(loaderTimer);["loader","slider","wire","empty"].forEach(id=>$(id).style.display="none");$("interpret").innerHTML="";aiNotes={};aiWire=[];}

// ---- main entry: only fires on Suggest / Enter / chip click (never on live typing) ----
function go(){
 const raw=$("ask").value.trim();const my=++runId;cur=0;aiNotes={};aiWire=[];
 if(raw) return runSearch(raw,my);
 if(selP.size) return runPillar(my);
 showStart();
}
// Search (brief): full AI — only genuine fits, tailored "why", wireframe (page briefs only)
async function runSearch(raw,my){
 noteLabel="For your brief";aiWire=[];
 if(!AI_ENDPOINT){const {order,qp}=heuristic();const bits=[...qp].map(p=>PILLARS[p][0]);paint(order,'Suggesting for <b>“'+raw+'”</b>'+(bits.length?" · pillar signal: "+bits.join(", "):"")+' — '+order.length+' match'+(order.length===1?"":"es"));return;}
 startLoader(SEARCH_MSGS);let payload=null;
 try{const r=await fetch(AI_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({brief:raw,pillars:[...selP]})});if(r.ok)payload=await r.json();}catch(e){}
 stopLoader(my,()=>{
  if(!payload){const {order}=heuristic();paint(order,'AI unavailable — '+order.length+' keyword match'+(order.length===1?"":"es")+' for <b>“'+raw+'”</b>');return;}
  aiNotes={};(payload.suggestions||[]).forEach(s=>{if(s&&s.id&&s.why)aiNotes[s.id]=s.why;});
  aiWire=Array.isArray(payload.wireframe)?payload.wireframe:[];
  const list=(payload.suggestions||[]).map(s=>DATA.find(d=>d.id===s.id)).filter(Boolean);
  paint(list, list.length?('Smart suggestions for <b>“'+raw+'”</b> — '+list.length+' good fit'+(list.length===1?"":"s")):('No component is a strong fit for <b>“'+raw+'”</b> — try rephrasing.'));
 });
}
// Browse by pillar: list the pillar's components + a pillar-tailored note per card, shown together
async function runPillar(my){
 const {order}=heuristic();const reqP=[...selP];const n=reqP.map(p=>PILLARS[p][0]).join(" + ");noteLabel="For "+n;aiWire=[];
 if(!AI_ENDPOINT){paint(order,order.length+' component'+(order.length===1?"":"s")+' for <b>'+n+'</b>');return;}
 startLoader(pillarMsgs());let notes=null;
 try{const r=await fetch(AI_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pillars:reqP,annotate:order.map(d=>d.id)})});if(r.ok){const data=await r.json();notes=data&&data.notes?data.notes:null;}}catch(e){}
 stopLoader(my,()=>{aiNotes=notes||{};paint(order, order.length+' component'+(order.length===1?"":"s")+' for <b>'+n+'</b>');});
}
$("prev").addEventListener("click",()=>{if(results.length){cur=(cur-1+results.length)%results.length;repaintActive();}});
$("next").addEventListener("click",()=>{if(results.length){cur=(cur+1)%results.length;repaintActive();}});
$("jump").addEventListener("change",e=>{cur=+e.target.value;repaintActive();});
const exHost=$("examples");
const SEARCH_ICO='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.5" y2="16.5"/></svg>';
EXAMPLES.forEach(t=>{const b=document.createElement("span");b.className="ex";b.innerHTML=SEARCH_ICO;b.appendChild(document.createTextNode(t));b.addEventListener("click",()=>{$("ask").value=t;go();});exHost.appendChild(b);});
// Pillar chips — coloured by swimlane · SINGLE-select; clicking routes through the loader (go)
Object.keys(PILLARS).forEach(k=>{const b=document.createElement("span");b.className="pchip";b.style.setProperty("--pc","var("+PILLARS[k][1]+")");b.innerHTML='<span class="dot"></span>';b.appendChild(document.createTextNode(PILLARS[k][0]));b.addEventListener("click",()=>{const wasOn=selP.has(k);selP.clear();document.querySelectorAll("#pillarChips .pchip").forEach(x=>x.classList.remove("on"));if(!wasOn){selP.add(k);b.classList.add("on");}$("ask").value="";go();});$("pillarChips").appendChild(b);});
// Triggers only on Suggest / Enter — NOT on live typing
$("askBtn").addEventListener("click",go);
$("ask").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
showStart();
</script>
</body>
</html>
